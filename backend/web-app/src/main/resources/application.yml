spring:
  application:
    name: smartcampus-hub
  config:
    import: optional:classpath:application-local.yml
  datasource:
    url: ${SMARTCAMPUS_DB_URL:jdbc:mysql://localhost:3306/smartcampus?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Colombo}
    username: ${SMARTCAMPUS_DB_USERNAME:root}
    # Override with SMARTCAMPUS_DB_PASSWORD, application-local.yml, or default below.
    password: ${SMARTCAMPUS_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Colombo
    database-platform: org.hibernate.dialect.MySQLDialect
  h2:
    console:
      enabled: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: "PLACEHOLDER_GOOGLE_CLIENT_ID"
            client-secret: "PLACEHOLDER_GOOGLE_CLIENT_SECRET"
            scope: profile, email

server:
  port: 8081
