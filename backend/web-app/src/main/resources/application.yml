spring:
  application:
    name: smartcampus-hub
  config:
    import: optional:classpath:application-local.yml
  datasource:
    url: ${SMARTCAMPUS_DB_URL:jdbc:mysql://localhost:3306/smartcampus?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Colombo}
    username: ${SMARTCAMPUS_DB_USERNAME:root}
    # Override with SMARTCAMPUS_DB_PASSWORD, application-local.yml, or default below.
    password: ${SMARTCAMPUS_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Colombo
    database-platform: org.hibernate.dialect.MySQLDialect
  h2:
    console:
      enabled: false

  # Google OAuth: optional. Prefer secrets in gitignored application-local.yml (see example file).
  # You can also set env vars GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET (or Spring-standard names below).
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - openid
              - profile
              - email

  # Google Sign-In is optional. Do not put OAuth secrets in this file (Git).
  # Copy application-local.yml.example → application-local.yml and add your Web client id/secret,
  # or set SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID and ..._CLIENT_SECRET.

server:
  port: 8081

# Used for OAuth success redirect and links in logs. Override with FRONTEND_BASE_URL in production.
smartcampus:
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
