spring:
  application:
    name: smartcampus-hub
  datasource:
    url: jdbc:h2:mem:smartcampus;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: password
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: "PLACEHOLDER_GOOGLE_CLIENT_ID"
            client-secret: "PLACEHOLDER_GOOGLE_CLIENT_SECRET"
            scope: profile, email

server:
  port: 8081
